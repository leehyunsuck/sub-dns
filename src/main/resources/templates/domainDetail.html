<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('도메인 상세 설정')}"></head>
<body>
    <header th:replace="~{fragments/layout :: header}"></header>

    <main id="content">
        <h2 id="domainTitle" th:text="${subDomain != null && zone != null} ? ${subDomain} + '.' + ${zone} : '신규 도메인 등록'">도메인 상세</h2>
        <div class="form-group">
            <label>레코드 타입</label>
            <select id="recordType" onchange="onRecordTypeChange()">
                <option value="A">A (IPv4 주소)</option>
                <option value="AAAA">AAAA (IPv6 주소)</option>
                <option value="CNAME">CNAME (별칭)</option>
                <option value="TXT">TXT (텍스트)</option>
            </select>
        </div>
        <div class="form-group">
            <label>값</label>
            <input type="text" id="recordValue" placeholder="예: 192.168.1.1">
        </div>

        <button id="saveBtn" onclick="submitRegistration()">등록 완료</button>
        <button class="btn-cancel" th:if="${subDomain != null && zone != null}" onclick="deleteDomain()">도메인 삭제</button>
        <button class="btn-cancel" onclick="location.href='/domains'">취소</button>
    </main>

    <div th:replace="~{fragments/layout :: footer}"></div>
    <div th:replace="~{fragments/layout :: scripts}"></div>
    <script th:inline="javascript">
        /*<![CDATA[*/
        const subDomainParam = [[${subDomain}]];
        const zoneParam = [[${zone}]];

        document.addEventListener('DOMContentLoaded', () => {
            if (subDomainParam && zoneParam) {
                openDomainDetail(subDomainParam, zoneParam, false);
            } else {
                // 신규 등록 로직 (필요시)
            }
        });
        /*]]>*/
    </script>
</body>
</html>
