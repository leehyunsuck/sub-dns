<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('도메인 상세 설정')}">
    <meta charset="UTF-8">
    <title>도메인 상세 설정</title>
    <link rel="stylesheet" href="../static/ObS/css/style.css" th:href="|${staticUrl}css/style.css|">
</head>
<body>
    <header th:replace="~{fragments/layout :: header}"></header>

    <main id="content">
        <h2 id="domainTitle" th:text="${isNew} ? |신규 도메인 등록 (${subDomain}.${zone})| : |도메인 상세 설정 (${subDomain}.${zone})|">도메인 상세</h2>
        <div class="form-group">
            <label>레코드 타입</label>
            <select id="recordType" onchange="onRecordTypeChange()">
                <option value="A">A (IPv4 주소)</option>
                <option value="AAAA">AAAA (IPv6 주소)</option>
                <option value="CNAME">CNAME (별칭)</option>
                <option value="TXT">TXT (텍스트)</option>
            </select>
        </div>
        <div class="form-group">
            <label>값</label>
            <input type="text" id="recordValue" placeholder="예: 192.168.1.1">
        </div>

        <button id="saveBtn" onclick="submitRegistration()" th:text="${isNew} ? '등록 완료' : '수정 완료'">등록 완료</button>
        <button class="btn-cancel" th:if="${!isNew}" onclick="deleteDomain()">도메인 삭제</button>
        <button class="btn-cancel" onclick="location.href='/domains'">취소</button>
    </main>

    <div th:replace="~{fragments/layout :: footer}"></div>
    <div th:replace="~{fragments/layout :: scripts}"></div>
    <script th:inline="javascript">
        /*<![CDATA[*/
        const subDomainParam = /*[[${subDomain}]]*/ null;
        const zoneParam = /*[[${zone}]]*/ null;
        const isNewParam = /*[[${isNew}]]*/ false;

        document.addEventListener('DOMContentLoaded', () => {
            if (subDomainParam && zoneParam) {
                openDomainDetail(subDomainParam, zoneParam, isNewParam);
            }
        });
        /*]]>*/
    </script>
</body>
</html>
