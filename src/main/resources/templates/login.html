<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('로그인')}">
    <meta charset="UTF-8">
    <title>로그인</title>
    <link rel="stylesheet" href="https://objectstorage.ap-chuncheon-1.oraclecloud.com/n/axxumyz085bt/b/nulldns.top/o/css/style.css">
</head>
<body>
    <header th:replace="~{fragments/layout :: header}"></header>

    <main id="content">
        <h2>로그인</h2>
        <div class="login-info">
            <p>소셜 로그인을 통해 모든 기능을 이용할 수 있습니다.</p>
            <p>계정이 없는 경우 자동 회원가입 됩니다.</p>
            <p>오로직 소셜 로그인 플랫폼 명칭과 고유번호만 저장합니다.</p>
        </div>

        <button id="githubLoginBtn" onclick="loginWithGitHub()">
            <img id="githubIcon" class="github-icon" th:src="|${staticUrl}assets/github-mark.svg|" alt="GitHub Logo">
            GitHub 계정으로 로그인
        </button>

        <div class="checkbox-group">
            <input type="checkbox" id="agree" name="agree">
            <label for="agree">
                <a th:href="|${staticUrl}ToS.txt|" target="_blank">이용약관</a> 동의
            </label>
        </div>
    </main>

    <div th:replace="~{fragments/layout :: footer}"></div>
    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
